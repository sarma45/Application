name: CI
on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: aiverse_test
          POSTGRES_USER: aiverse
          POSTGRES_PASSWORD: aiverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://aiverse:aiverse@localhost:5432/aiverse_test
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm vitest run --coverage
        env:
          DATABASE_URL: postgresql://aiverse:aiverse@localhost:5432/aiverse_test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  migration-test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: aiverse_migration_test
          POSTGRES_USER: aiverse
          POSTGRES_PASSWORD: aiverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - name: Run migrations against fresh database
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://aiverse:aiverse@localhost:5432/aiverse_migration_test
      - name: Verify migration state
        run: pnpm prisma migrate status
        env:
          DATABASE_URL: postgresql://aiverse:aiverse@localhost:5432/aiverse_migration_test
      - name: Test rollback (if previous migration exists)
        run: |
          MIGRATIONS=$(ls -1 prisma/migrations/ 2>/dev/null | wc -l)
          if [ "$MIGRATIONS" -gt 1 ]; then
            LAST_MIGRATION=$(ls -1 prisma/migrations/ | tail -1)
            echo "Testing rollback of: $LAST_MIGRATION"
            npx prisma migrate resolve --rolled-back "$LAST_MIGRATION" 2>/dev/null || true
          fi
        env:
          DATABASE_URL: postgresql://aiverse:aiverse@localhost:5432/aiverse_migration_test

  build:
    runs-on: ubuntu-latest
    needs: migration-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 7
