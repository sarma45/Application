name: CI
on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: aiverse_test
          POSTGRES_USER: aiverse
          POSTGRES_PASSWORD: aiverse
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://aiverse:aiverse@localhost:5432/aiverse_test
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm vitest run
        env:
          DATABASE_URL: postgresql://aiverse:aiverse@localhost:5432/aiverse_test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
