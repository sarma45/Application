name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/aiverse
            git pull
            docker compose -f docker-compose.prod.yml down app
            docker compose -f docker-compose.prod.yml build app
            docker compose -f docker-compose.prod.yml up -d app
            sleep 10
            curl -sf http://localhost:3000/api/health || { echo "Health check failed"; exit 1; }
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate deploy
            docker system prune -f
            echo "Deployment complete"

      - name: Notify via Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          MESSAGE="AIVerse deployment to main: $STATUS"
          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" > /dev/null 2>&1 || true
