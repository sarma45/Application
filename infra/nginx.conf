user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 50M;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=api:10m rate=200r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=payment:10m rate=20r/m;
  limit_req_zone $binary_remote_addr zone=ai:10m rate=100r/m;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  # CORS settings
  map $http_origin $cors_origin {
    default "";
    "http://localhost:3000" $http_origin;
    "https://localhost:3000" $http_origin;
    "~^https://.*\.aiverse\.ai$" $http_origin;
  }

  # Upstreams
  upstream app_backend {
    server app:3000 max_fails=3 fail_timeout=10s;
    keepalive 64;
  }

  upstream ai_gateway_backend {
    server ai-gateway:4001 max_fails=3 fail_timeout=10s;
    keepalive 16;
  }

  server {
    listen 80;
    server_name aiverse.ai localhost;
    return 301 https://$server_name$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name aiverse.ai localhost;

    ssl_certificate /etc/letsencrypt/live/aiverse.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiverse.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # WebSocket support for chat
    location /ws/ {
      proxy_pass http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # API v1 routes (versioned)
    location /api/v1/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 120s;

      # CORS headers
      add_header Access-Control-Allow-Origin $cors_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key, X-Request-ID" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Max-Age 86400 always;

      if ($request_method = 'OPTIONS') {
        return 204;
      }
    }

    # AI Gateway direct API
    location /api/ai/ {
      limit_req zone=ai burst=10 nodelay;
      proxy_pass http://ai-gateway:4001/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;

      # CORS headers
      add_header Access-Control-Allow-Origin $cors_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Max-Age 86400 always;

      if ($request_method = 'OPTIONS') {
        return 204;
      }
    }

    # Main app proxy
    location / {
      proxy_pass http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 120s;
    }

    # Rate limiting for specific endpoints
    location /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://app:3000;
    }

    location /api/auth/register {
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://app:3000;
    }

    location /api/auth/forgot-password {
      limit_req zone=auth burst=3 nodelay;
      proxy_pass http://app:3000;
    }

    location /api/auth/reset-password {
      limit_req zone=auth burst=3 nodelay;
      proxy_pass http://app:3000;
    }

    location /api/checkout {
      limit_req zone=payment burst=3 nodelay;
      proxy_pass http://app:3000;
    }

    location /api/webhooks/ {
      limit_req zone=webhook burst=5 nodelay;
      proxy_pass http://app:3000;
    }

    # Static assets cache
    location /_next/static {
      proxy_pass http://app:3000;
      expires 365d;
      add_header Cache-Control "public, immutable";
    }

    location /static {
      proxy_pass http://app:3000;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # Health check
    location /api/health {
      proxy_pass http://app:3000;
      access_log off;
      add_header Content-Type application/json;
    }

    # OpenAPI spec
    location /api/v1/openapi.json {
      proxy_pass http://app:3000;
      access_log off;
    }
  }
}
