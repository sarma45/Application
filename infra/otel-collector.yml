receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: basic
  otlphttp:
    endpoint: "${OTLP_HTTP_ENDPOINT:-http://localhost:4318}"
    tls:
      insecure: true
  logging:
    loglevel: warn

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  attributes:
    actions:
      - key: environment
        value: "${NODE_ENV:-development}"
        action: upsert
  resourcedetection:
    detectors: [env]
    timeout: 5s

connectors:
  healthcheck:
    endpoint: 0.0.0.0:13133

service:
  extensions: [healthcheck]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch, attributes]
      exporters: [otlphttp, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch, attributes]
      exporters: [otlphttp, debug]
