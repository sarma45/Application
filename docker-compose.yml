services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    environment:
      DATABASE_URL: postgresql://aiverse:aiverse@postgres:5432/aiverse?schema=public
      REDIS_URL: redis://aiverse@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: aiverse
      POSTGRES_USER: aiverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiverse}
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aiverse']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-aiverse}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --loglevel notice
      --save 60 1
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redisdata:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '$${REDIS_PASSWORD:-aiverse}', 'PING']
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-aiverse}

volumes:
  pgdata:
  redisdata:
