services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://aiverse:${POSTGRES_PASSWORD:-aiverse}@postgres:5432/aiverse
      REDIS_URL: redis://:${REDIS_PASSWORD:-aiverse}@redis:6379
      DIRECT_URL: postgresql://aiverse:${POSTGRES_PASSWORD:-aiverse}@postgres:5432/aiverse
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: aiverse
      POSTGRES_USER: aiverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiverse}
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aiverse']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-aiverse}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - app
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/healthz']
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
